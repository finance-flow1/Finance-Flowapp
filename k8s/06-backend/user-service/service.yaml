# =============================================================================
#  Service — user-service (ClusterIP; frontend nginx proxies /api/v1/auth + /api/v1/users)
#  Namespace stamped by Kustomize (dev | prod).
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      protocol: TCP
