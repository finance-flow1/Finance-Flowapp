# =============================================================================
#  Deployment — user-service
#  Namespace stamped by Kustomize (dev | prod).
#  DB: postgres:5432 (same namespace) via postgres-secret
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
    app.kubernetes.io/part-of: finance-app
    app.kubernetes.io/component: microservice
spec:
  replicas: 2                   # overridden by Kustomize patch
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: finance-app
    spec:
      serviceAccountName: finance-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: user-service
          image: aswin1015/finance-flowapp-user-service
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: production
            - name: DB_HOST
              value: postgres        # local ClusterIP service (same namespace)
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: USER_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
