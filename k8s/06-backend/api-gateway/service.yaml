# =============================================================================
#  Service — api-gateway  (ClusterIP; Kgateway HTTPRoute points here)
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: backend
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
