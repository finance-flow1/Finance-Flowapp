# =============================================================================
#  Deployment — api-gateway
#
#  Routes:  /api/v1/auth/*         → user-service:5001  (no JWT)
#           /api/v1/users/*        → user-service:5001  (JWT required)
#           /api/v1/transactions/* → transaction-service:5002  (JWT required)
#
#  DB connectivity: NONE — gateway does not touch a database.
#  JWT_SECRET is read from jwt-secret (in backend ns).
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: backend
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: finance-app
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: finance-app
    spec:
      serviceAccountName: finance-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: area51devops/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: USER_SERVICE_URL
              value: http://user-service.backend.svc.cluster.local:5001
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service.backend.svc.cluster.local:5002
            - name: CORS_ORIGIN
              value: "*"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
