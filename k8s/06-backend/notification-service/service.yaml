# =============================================================================
#  Service — notification-service (ClusterIP; frontend nginx proxies /api/v1/notifications)
#  Namespace stamped by Kustomize (dev | prod).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003
      protocol: TCP
