# =============================================================================
#  Service — transaction-service (ClusterIP; frontend nginx proxies /api/v1/transactions)
#  Namespace stamped by Kustomize (dev | prod).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: transaction-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002
      protocol: TCP
