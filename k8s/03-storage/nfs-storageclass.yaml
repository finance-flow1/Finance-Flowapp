# =============================================================================
#  NFS StorageClass
#
#  Install the NFS provisioner first (once per cluster):
#    helm repo add nfs-subdir-external-provisioner \
#      https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
#
#    helm install nfs-provisioner \
#      nfs-subdir-external-provisioner/nfs-subdir-external-provisioner \
#      --set nfs.server=<NFS_SERVER_IP> \
#      --set nfs.path=<NFS_EXPORT_PATH> \
#      --set storageClass.name=nfs-storage \
#      --namespace nfs-provisioner --create-namespace
# =============================================================================
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
  labels:
    app.kubernetes.io/part-of: finance-app
provisioner: cluster.local/nfs-subdir-external-provisioner
parameters:
  archiveOnDelete: "false"   # delete NFS folder when PVC is deleted
reclaimPolicy: Retain        # keep the data even if PVC is deleted (safe default)
volumeBindingMode: Immediate
allowVolumeExpansion: true
