# =============================================================================
#  HTTPRoutes — kgateway routing rules
#
#  Architecture (matching docker-compose nginx.conf):
#    /api/v1/auth          → user-service:5001
#    /api/v1/users         → user-service:5001
#    /api/v1/transactions  → transaction-service:5002
#    /api/v1/notifications → notification-service:5003
#    /                     → frontend:80
#
#  All backendRefs are in the same namespace as the HTTPRoute.
#  Namespace is stamped by Kustomize (dev | prod).
# =============================================================================

# ── API routes ────────────────────────────────────────────────────────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: user-service
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /users
      backendRefs:
        - name: user-service
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/transactions
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /transactions
      backendRefs:
        - name: transaction-service
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /notifications
      backendRefs:
        - name: notification-service
          port: 5003

# ── Frontend catch-all ────────────────────────────────────────────────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
