# =============================================================================
#  ReferenceGrants — allow HTTPRoutes in dev/prod to attach to Gateway in gate
#
#  Gateway lives in the 'gate' namespace (cluster infrastructure).
#  HTTPRoutes are stamped with dev or prod by Kustomize.
#  ReferenceGrant MUST live in the TARGET namespace (gate) and name the
#  SOURCE namespace. We provide one grant per environment.
#
#  Apply once per cluster (before deploying dev/prod):
#    kubectl apply -f k8s/08-gateway/referencegrants.yaml
# =============================================================================

# Grant: HTTPRoutes in 'dev' → Gateway in 'gate'
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-dev-routes
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: dev
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway

# Grant: HTTPRoutes in 'prod' → Gateway in 'gate'
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-prod-routes
  namespace: gate
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: prod
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
