# =============================================================================
#  Kustomize — Gateway Infrastructure (applied ONCE per cluster, not per env)
#
#  These resources are cluster-level and must NOT go through the dev/prod
#  overlays (Kustomize would stamp dev/prod namespace and break the gateway).
#
#  Apply once:
#    kubectl apply -k k8s/08-gateway
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ensure gate namespace exists first
resources:
  - gate-namespace.yaml
  - gatewayclass.yaml      # cluster-scoped — no namespace
  - gateway.yaml           # must stay in 'gate' namespace
  - referencegrants.yaml   # must stay in 'gate' namespace
