# =============================================================================
#  HTTPRoutes — traffic routing rules attached to finance-gateway
#
#  Routing priority (Gateway API longest-prefix match):
#    1.  /api/v1/auth          → user-service.backend:5001    (public, no JWT)
#    2.  /api/v1/users         → user-service.backend:5001    (JWT required @ service)
#    3.  /api/v1/transactions  → transaction-service.backend:5002
#    4.  /api/v1/notifications → notification-service.backend:5003
#    5.  /                     → frontend.frontend:80         (SPA catch-all)
#
#  NOTE: Each HTTPRoute lives in the same namespace as its backendRef service.
#  Cross-namespace parentRef (HTTPRoute → Gateway in gate ns) is covered by
#  referencegrants.yaml.
# =============================================================================

# ── /api/v1/* → backend services (route owned by backend namespace) ────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: backend
  labels:
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
      sectionName: http
  rules:
    # Auth routes → user-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      backendRefs:
        - name: user-service
          port: 5001
    # User profile / admin → user-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: 5001
    # Transactions → transaction-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/transactions
      backendRefs:
        - name: transaction-service
          port: 5002
    # Notifications → notification-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/notifications
      backendRefs:
        - name: notification-service
          port: 5003

# ── /* → frontend (route owned by frontend namespace) ────────────────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: frontend
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
