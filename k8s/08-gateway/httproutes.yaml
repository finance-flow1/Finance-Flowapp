# =============================================================================
#  HTTPRoutes — traffic routing rules attached to finance-gateway
#
#  Priority (Gateway API uses longest-prefix match):
#    1.  /api  →  api-gateway.backend:4000    (more specific, matched first)
#    2.  /     →  frontend.frontend:80        (catch-all, SPA fallback)
#
#  IMPORTANT — each HTTPRoute lives in the same namespace as its backendRef
#  service.  This means no cross-namespace backendRef ReferenceGrant is needed.
#  The parentRef cross-namespace grant (HTTPRoute → Gateway in gate ns) is
#  covered by referencegrants.yaml.
# =============================================================================

# ── /api → api-gateway (route owned by backend namespace) ────────────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: backend                 # same ns as backendRef service
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate                # cross-ns → covered by ReferenceGrant
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway          # same namespace as this HTTPRoute → no ReferenceGrant needed
          port: 4000

# ── /* → frontend (route owned by frontend namespace) ────────────────────────
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: frontend                # same ns as backendRef service
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
spec:
  parentRefs:
    - name: finance-gateway
      namespace: gate                # cross-ns → covered by ReferenceGrant
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend             # same namespace as this HTTPRoute → no ReferenceGrant needed
          port: 80
