# =============================================================================
#  ServiceAccounts — one shared SA per namespace
#  gate ns is excluded — kgateway manages its own SA internally.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finance-app-sa
  namespace: backend
  labels:
    app.kubernetes.io/part-of: finance-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finance-app-sa
  namespace: frontend
  labels:
    app.kubernetes.io/part-of: finance-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finance-app-sa
  namespace: data
  labels:
    app.kubernetes.io/part-of: finance-app
