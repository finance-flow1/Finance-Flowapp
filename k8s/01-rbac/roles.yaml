# =============================================================================
#  Role — single Role per environment namespace (least-privilege superset)
#  Namespace is stamped by Kustomize (dev | prod).
#
#  Grants:
#    secrets     → backend services need DB creds, JWT, RabbitMQ URL
#    configmaps  → postgres init SQL ConfigMap
#    pvcs        → postgres pod reads its PVC
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: finance-app-role
  labels:
    app.kubernetes.io/part-of: finance-app
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
