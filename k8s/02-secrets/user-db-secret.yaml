# ─────────────────────────────────────────────────────────────────────────────
#  Secrets — User Service PostgreSQL credentials
#
#  ⚠️  NEVER commit real values to Git.
#  ✅  Use Sealed Secrets or External Secrets Operator in production.
#      Replace the base64 values below with `kubeseal` output.
#
#  To generate base64: echo -n "value" | base64
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: user-db-secret
  namespace: data
  annotations:
    # Sealed Secrets annotation — run: kubeseal < user-db-secret.yaml > user-db-secret.sealed.yaml
    sealedsecrets.bitnami.com/managed: "true"
  labels:
    app: user-db
    app.kubernetes.io/part-of: finance-app
type: Opaque
data:
  # echo -n "financeuser" | base64
  POSTGRES_USER: ZmluYW5jZXVzZXI=
  # echo -n "user-service-strong-password" | base64
  POSTGRES_PASSWORD: dXNlci1zZXJ2aWNlLXN0cm9uZy1wYXNzd29yZA==
  # echo -n "userdb" | base64
  POSTGRES_DB: dXNlcmRi
