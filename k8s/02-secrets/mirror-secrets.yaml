# ─────────────────────────────────────────────────────────────────────────────
#  Secret Mirror — user-db-secret mirrored to backend namespace
#  (user-service needs DB credentials but secret lives in data ns)
#
#  Option A (simple): duplicate the secret here with same values
#  Option B (prod):   use External Secrets Operator or Reflector
#
#  This file uses Option A for simplicity. Replace with ESO in production.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: user-db-secret
  namespace: backend
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
  labels:
    app: user-service
    app.kubernetes.io/part-of: finance-app
type: Opaque
data:
  POSTGRES_USER: ZmluYW5jZXVzZXI=
  POSTGRES_PASSWORD: dXNlci1zZXJ2aWNlLXN0cm9uZy1wYXNzd29yZA==
  POSTGRES_DB: dXNlcmRi

