# =============================================================================
#  Secret — postgres (unified single-DB replacing user-db + txn-db secrets)
#
#  !! ROTATE THESE VALUES IN PRODUCTION !!
#  Use External Secrets Operator or Sealed Secrets in real deployments.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app.kubernetes.io/part-of: finance-app
type: Opaque
stringData:
  POSTGRES_USER:     "financeuser"
  POSTGRES_PASSWORD: "financepass"    # CHANGE_ME in prod
  POSTGRES_DB:       "financedb"
