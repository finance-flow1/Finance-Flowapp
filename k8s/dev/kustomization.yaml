# =============================================================================
#  Kustomize OVERLAY — dev  (maps to the Git dev branch)
#
#  kubectl apply -k k8s/dev
#
#  What this overlay does:
#    · Creates the "dev" namespace
#    · Stamps namespace: dev on ALL resources
#    · Patches replicas → 1 (cost-saving for dev)
#    · Applies permissive network policy (allow all same-namespace traffic)
#    · Uses :dev image tags built from the dev branch
#
#  CI/CD tip:
#    Build images with :dev tag when the dev branch is pushed.
#    Then run:  kubectl apply -k k8s/dev
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../base                          # all base resources
  - namespace.yaml                   # creates the "dev" namespace first

patches:
  # ── Replica counts → 1 in dev ───────────────────────────────────────────
  - path: patches/replicas.yaml

  # ── Permissive network policy override ──────────────────────────────────
  - path: patches/netpol-permissive.yaml
    target:
      kind: NetworkPolicy
      name: default-deny-all

commonAnnotations:
  environment: dev
  git-branch: dev

configMapGenerator: []

# Dev branch image tags (:dev)
images:
  - name: aswin1015/finance-flowapp-user-service
    newTag: dev
  - name: aswin1015/finance-flowapp-transaction-service
    newTag: dev
  - name: aswin1015/finance-flowapp-notification-service
    newTag: dev
  - name: aswin1015/finance-flowapp-client
    newTag: dev
