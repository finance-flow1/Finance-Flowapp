# =============================================================================
#  Network Policies — frontend namespace
#
#  frontend ns hosts the Nginx SPA pod.
#
#  INGRESS:  Only from gate ns (Kgateway routes /* here)
#  EGRESS:   DNS only — nginx serves static files, no outbound calls needed
#  DEFAULT:  Deny everything else
# =============================================================================

# Deny all by default
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: frontend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# Allow ingress from gate ns only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gate
  namespace: frontend
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gate
      ports:
        - port: 80
          protocol: TCP

# DNS egress only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: frontend
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
