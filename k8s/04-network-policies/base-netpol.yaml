# =============================================================================
#  Network Policies — BASE (single namespace, matching docker-compose arch)
#
#  Architecture (all pods in same namespace):
#    internet → frontend:80
#    frontend → user-service:5001, transaction-service:5002,
#                notification-service:5003
#    user-service, transaction-service, notification-service → postgres:5432
#    transaction-service → rabbitmq:5672
#    notification-service → rabbitmq:5672 (consumer)
#    all pods → kube-dns:53
#
#  DEFAULT: deny all ingress + egress (overridden by allow rules below)
# =============================================================================

# ── 0. Default deny all ───────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ── 1. DNS egress (all pods must resolve service names) ───────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── 2. Frontend — ingress from anywhere on port 80 ───────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP

# ── 3. Frontend egress → backend services ─────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 5001
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: transaction-service
      ports:
        - port: 5002
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 5003
          protocol: TCP

# ── 4. Backend services — ingress from frontend only ─────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user-service
          - transaction-service
          - notification-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 5001
          protocol: TCP
        - port: 5002
          protocol: TCP
        - port: 5003
          protocol: TCP

# ── 5. Backend services egress → postgres ────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user-service
          - transaction-service
          - notification-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP

# ── 6. transaction-service + notification-service → rabbitmq ─────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-rabbitmq
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - transaction-service
          - notification-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
          protocol: TCP

# ── 7. RabbitMQ ingress from transaction + notification services ──────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-ingress
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - transaction-service
                  - notification-service
      ports:
        - port: 5672
          protocol: TCP

# ── 8. Postgres ingress from backend services ─────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - user-service
                  - transaction-service
                  - notification-service
      ports:
        - port: 5432
          protocol: TCP
