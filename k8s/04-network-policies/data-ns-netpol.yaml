# =============================================================================
#  Network Policies — data namespace
#
#  user-db  → ingress ONLY from backend/user-service (port 5432)
#  txn-db   → ingress ONLY from backend/transaction-service (port 5432)
#
#  NO EGRESS at all — databases never initiate outbound connections.
#  DEFAULT:  Deny everything else
# =============================================================================

# Deny all by default
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# user-db: ingress from user-service in backend ns ONLY
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-db-from-user-svc
  namespace: data
spec:
  podSelector:
    matchLabels:
      app: user-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend
          podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 5432
          protocol: TCP

# txn-db: ingress from transaction-service in backend ns ONLY
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-txn-db-from-txn-svc
  namespace: data
spec:
  podSelector:
    matchLabels:
      app: txn-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend
          podSelector:
            matchLabels:
              app: transaction-service
      ports:
        - port: 5432
          protocol: TCP

# DNS egress — needed for postgres readiness probe DNS lookups
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: data
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
