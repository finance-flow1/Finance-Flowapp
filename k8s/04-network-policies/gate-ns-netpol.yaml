# =============================================================================
#  Network Policies — gate namespace
#
#  Kgateway deploys its proxy pod INTO the gate namespace, so all pods
#  here ARE the kgateway proxy.  We use podSelector: {} (all pods in ns)
#  for ingress/egress rules — the default-deny-all is still enforced so
#  no other pod can exist without an explicit policy.
#
#  INGRESS:  Any source → port 80 (HAProxy → NodePort → proxy)
#  EGRESS:   gate pods → frontend:80  AND  gate pods → backend:4000
#  DEFAULT:  Deny everything else
# =============================================================================

# Deny all in-flight traffic by default
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gate
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# Allow inbound traffic on port 80 from any source (HAProxy / external)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: gate
spec:
  podSelector: {}          # all pods in gate ns = kgateway proxy
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 8443          # HTTPS if you add a TLS listener later
          protocol: TCP

# Allow proxy to forward to frontend namespace (SPA, port 80)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-frontend
  namespace: gate
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: frontend
      ports:
        - port: 80
          protocol: TCP

# Allow proxy to forward to backend namespace (api-gateway, port 4000)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-backend
  namespace: gate
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend
      ports:
        - port: 4000
          protocol: TCP

# DNS egress — required for service discovery
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gate
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
