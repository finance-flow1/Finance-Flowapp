# =============================================================================
#  Deployment — frontend (Nginx SPA + API proxy)
#  The nginx container serves the React build AND proxies /api/v1/* to
#  the backend microservices directly (nginx.conf inside the image handles this).
#  Namespace stamped by Kustomize (dev | prod).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
    app.kubernetes.io/component: ui
spec:
  replicas: 2                   # overridden by Kustomize patch
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: finance-app
    spec:
      serviceAccountName: finance-app-sa
      containers:
        - name: frontend
          image: area51devops/frontend-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
