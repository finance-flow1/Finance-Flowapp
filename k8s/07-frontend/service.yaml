# =============================================================================
#  Service — frontend  (ClusterIP; Kgateway HTTPRoute /* points here)
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
