# =============================================================================
#  Service — frontend (ClusterIP; kgateway HTTPRoute /* points here)
#  Namespace stamped by Kustomize (dev | prod).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
    app.kubernetes.io/part-of: finance-app
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
