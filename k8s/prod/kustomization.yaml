# =============================================================================
#  Kustomize OVERLAY — prod  (maps to the Git prod branch)
#
#  kubectl apply -k k8s/prod
#
#  What this overlay does:
#    · Creates the "prod" namespace
#    · Stamps namespace: prod on ALL resources
#    · Patches replicas → 2+ (HA for production)
#    · Enforces strict network policy (keeps base default-deny intact)
#    · Adds strict resource limits patch
#    · Deploys HPA for autoscaling
#    · Uses :stable image tags (pin to a release tag or commit SHA in CI)
#    · Sets imagePullPolicy: IfNotPresent for pinned tags
#
#  CI/CD tip:
#    Build images with :stable (or a version tag) when the prod branch is pushed.
#    Then run:  kubectl apply -k k8s/prod
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../base                          # all base resources
  - namespace.yaml                   # creates the "prod" namespace first
  - hpa.yaml                         # HorizontalPodAutoscalers for prod

patches:
  # ── Replica counts → 2 in prod ──────────────────────────────────────────
  - path: patches/replicas.yaml

  # ── Strict network policy (adds additional prod-only netpols) ───────────
  - path: patches/netpol-strict.yaml
    target:
      kind: NetworkPolicy
      name: allow-frontend-ingress

  # ── imagePullPolicy: IfNotPresent for pinned prod tags ──────────────────
  - path: patches/image-pull-policy.yaml

commonAnnotations:
  environment: prod
  git-branch: prod

# Prod uses pinned stable image tags (update on each release)
images:
  - name: aswin1015/finance-flowapp-user-service
    newTag: stable
  - name: aswin1015/finance-flowapp-transaction-service
    newTag: stable
  - name: aswin1015/finance-flowapp-notification-service
    newTag: stable
  - name: aswin1015/finance-flowapp-client
    newTag: stable
