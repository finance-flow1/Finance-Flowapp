# =============================================================================
#  Patch — strict ingress on frontend in prod
#
#  In prod we lock frontend ingress to known CIDR ranges only.
#  Replace 0.0.0.0/0 with your actual trusted CIDR (e.g. load balancer IP).
#
#  NOTE: The base network policy already enforces deny-all + allow rules.
#  This patch tightens the frontend ingress to specific IP ranges
#  (e.g. restrict to load balancer / WAF IP only).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
      from:
        - ipBlock:
            cidr: 0.0.0.0/0     # CHANGE: restrict to your load balancer / WAF CIDR
