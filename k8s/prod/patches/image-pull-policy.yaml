# =============================================================================
#  Patch — imagePullPolicy for prod
#
#  Prod uses pinned/stable tags. IfNotPresent avoids unnecessary pulls
#  and prevents accidentally fetching a mutated tag from the registry.
# =============================================================================

# user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  template:
    spec:
      containers:
        - name: user-service
          imagePullPolicy: IfNotPresent

